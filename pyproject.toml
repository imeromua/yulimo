[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | alembic
)/
'''

[tool.isort]
profile = "black"
line_length = 100
src_paths = ["backend"]
skip = ["alembic", "venv", ".venv"]

[tool.pytest.ini_options]
asyncio_mode = "strict"
testpaths = ["tests"]
