name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------- Якість коду ----------
  lint:
    name: Лінтинг та форматування
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Встановити інструменти якості
        run: pip install black isort flake8

      - name: black — перевірка форматування
        run: black --check backend/

      - name: isort — перевірка сортування імпортів
        run: isort --check-only backend/

      - name: flake8 — статичний аналіз
        run: flake8 backend/ --max-line-length=100 --exclude=backend/alembic

  # ---------- Тести ----------
  test:
    name: Автоматичні тести
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Встановити залежності
        run: pip install -r backend/requirements.txt

      - name: Запустити тести pytest
        env:
          DATABASE_URL: "sqlite:///./test.db"
          SECRET_KEY: "ci-test-secret-key-that-is-long-enough"
          DEBUG: "True"
        run: pytest tests/ -v --tb=short

  # ---------- Docker збірка ----------
  docker:
    name: Docker збірка
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Зібрати Docker образ
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: yulimo/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
