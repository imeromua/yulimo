services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yulimo_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://yulimo:yulimo_pass@db:5432/yulimo_db
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      LOG_DIR: /app/logs
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yulimo_net

  db:
    image: postgres:16-alpine
    container_name: yulimo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yulimo
      POSTGRES_PASSWORD: yulimo_pass
      POSTGRES_DB: yulimo_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yulimo -d yulimo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yulimo_net

volumes:
  pgdata:
  backend_logs:

networks:
  yulimo_net:
    driver: bridge
