<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Юлімо — База відпочинку · Пуща-Водиця</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #0e2318;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .logo {
            font-size: 5rem;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 3.5rem;
            color: #c8e6c9;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #81c784;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: #4caf50;
            margin: 0 auto 40px;
        }
        .coming-soon {
            font-size: 1.3rem;
            color: #a5d6a7;
            margin-bottom: 50px;
        }
        .features {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 50px;
        }
        .feature {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px 25px;
            min-width: 140px;
        }
        .feature .icon { font-size: 2rem; margin-bottom: 8px; }
        .feature .label { font-size: 0.9rem; color: #a5d6a7; }
        .contacts {
            font-size: 0.95rem;
            color: #66bb6a;
            line-height: 2;
        }
        .contacts a {
            color: #81c784;
            text-decoration: none;
        }
        .contacts a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .logo { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <div class="logo">🌲</div>
    <h1>ЮЛІМО</h1>
    <p class="subtitle">БАЗА ВІДПОЧИНКУ · ПУЩА-ВОДИЦЯ · КИЇВ</p>
    <div class="divider"></div>
    <p class="coming-soon">Сайт у розробці — незабаром відкриємось!</p>
    <div class="features">
        <div class="feature">
            <div class="icon">🛏</div>
            <div class="label">Номери<br>та котеджі</div>
        </div>
        <div class="feature">
            <div class="icon">🍽</div>
            <div class="label">Ресторан<br>та кухня</div>
        </div>
        <div class="feature">
            <div class="icon">🧖</div>
            <div class="label">Сауна<br>та басейн</div>
        </div>
        <div class="feature">
            <div class="icon">🎣</div>
            <div class="label">Риболовля<br>та природа</div>
        </div>
    </div>
    <div class="contacts">
        <p>📍 Пуща-Водиця, Київ</p>
        <p>📞 <a href="tel:+380000000000">+38 (000) 000-00-00</a></p>
        <p>✉️ <a href="mailto:info@yulimo.kyiv.ua">info@yulimo.kyiv.ua</a></p>
    </div>
</body>
</html>
