<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування — Адмін-панель Юлімо</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .settings-group { background:#fff; border:1px solid #e8e0d0; border-radius:12px; padding:20px; margin-bottom:20px; }
        .settings-group h3 { margin:0 0 16px; color:#2d5a27; font-size:1rem; border-bottom:1px solid #e8e0d0; padding-bottom:10px; }
        .settings-grid { display:grid; gap:14px; }
        .setting-row { display:grid; grid-template-columns:1fr 2fr; gap:12px; align-items:center; }
        .setting-label { font-size:.88rem; color:#555; }
        .setting-key { font-size:.72rem; color:#999; font-family:monospace; }
        .toggle-wrap { display:flex; align-items:center; gap:8px; }
        .maintenance-banner { background:#fff3cd; border:1px solid #ffc107; border-radius:8px; padding:12px 16px; margin-bottom:16px; color:#856404; display:none; }
        @media(max-width:600px) { .setting-row { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div class="admin-layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/admin/bookings.html" class="sidebar-logo">ЮЛІМО</a>
            <div class="sidebar-label">Адмін-панель</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/bookings.html"><span class="nav-icon">📋</span> Бронювання</a>
            <a href="/admin/rooms.html"><span class="nav-icon">🏠</span> Номери</a>
            <a href="/admin/restaurant.html"><span class="nav-icon">🍽️</span> Ресторан</a>
            <a href="/admin/clients.html"><span class="nav-icon">👥</span> Клієнти</a>
            <a href="/admin/media.html"><span class="nav-icon">🖼️</span> Медіа</a>
            <a href="/admin/emails.html"><span class="nav-icon">📧</span> Емейли</a>
            <a href="/admin/content.html"><span class="nav-icon">📝</span> Контент</a>
            <a href="/admin/settings.html" class="active"><span class="nav-icon">⚙️</span> Налаштування</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebarUser">—</div>
            <button class="btn btn-secondary btn-block" id="logoutBtn">Вийти</button>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <div class="main-content">
        <header class="topbar">
            <button class="burger-btn" id="burgerBtn"><span></span><span></span><span></span></button>
            <span class="topbar-title">Налаштування</span>
            <div class="topbar-actions">
                <button class="btn btn-primary btn-sm" id="saveAllBtn">💾 Зберегти все</button>
            </div>
        </header>

        <main class="page-content">

            <!-- Maintenance banner -->
            <div id="maintenanceBanner" class="maintenance-banner">
                ⚠️ Увага: режим технічного обслуговування увімкнено. Сайт недоступний для відвідувачів.
            </div>

            <div id="alertBox" class="alert"></div>

            <!-- General -->
            <div class="settings-group">
                <h3>🏠 Загальне</h3>
                <div class="settings-grid" id="group-general"></div>
            </div>

            <!-- Contacts -->
            <div class="settings-group">
                <h3>📞 Контакти</h3>
                <div class="settings-grid" id="group-contacts"></div>
            </div>

            <!-- Social -->
            <div class="settings-group">
                <h3>🌐 Соцмережі</h3>
                <div class="settings-grid" id="group-social"></div>
            </div>

            <!-- SEO -->
            <div class="settings-group">
                <h3>🔍 SEO</h3>
                <div class="settings-grid" id="group-seo"></div>
            </div>

            <!-- Features -->
            <div class="settings-group">
                <h3>⚙️ Функції сайту</h3>
                <div class="settings-grid" id="group-features"></div>
            </div>

        </main>
    </div>
</div>

<div id="toast-container"></div>

<script type="module">
    import { requireAuth, logout, getToken } from './js/auth.js';
    if (!requireAuth()) { /* redirected */ }

    const API = '/api';
    const token = () => getToken();
    const h = () => ({ 'Authorization': `Bearer ${token()}`, 'Content-Type': 'application/json' });

    function toast(msg, type='success') {
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.textContent = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    let allSettings = {};

    async function loadSettings() {
        const res = await fetch(`${API}/admin/settings`, { headers: h() });
        const json = await res.json();
        if (!json.success) { document.getElementById('alertBox').textContent = 'Помилка завантаження'; return; }
        allSettings = json.data;
        renderGroups();
        checkMaintenance();
    }

    const GROUP_ORDER = ['general', 'contacts', 'social', 'seo', 'features'];

    function renderGroups() {
        for (const group of GROUP_ORDER) {
            const items = allSettings[group] || [];
            const container = document.getElementById(`group-${group}`);
            if (!container) continue;
            container.innerHTML = items.map(s => renderSetting(s)).join('');
        }
    }

    function renderSetting(s) {
        const isBoolean = s.setting_type === 'boolean';
        const isLong = s.key === 'meta_description' || s.key === 'meta_keywords' || s.key === 'season_banner_text';
        const isUrl = s.setting_type === 'url';
        let input;
        if (isBoolean) {
            const checked = s.value === 'true' ? 'checked' : '';
            input = `<div class="toggle-wrap">
                <input type="checkbox" id="s-${s.key}" data-key="${s.key}" data-type="boolean" ${checked} onchange="this.nextElementSibling.textContent=this.checked?'Увімкнено':'Вимкнено'" style="width:18px;height:18px;">
                <label for="s-${s.key}" style="font-size:.9rem;">${s.value === 'true' ? 'Увімкнено' : 'Вимкнено'}</label>
            </div>`;
        } else if (isLong) {
            input = `<textarea id="s-${s.key}" data-key="${s.key}" class="filter-select" rows="3" style="width:100%;box-sizing:border-box;resize:vertical;">${esc(s.value)}</textarea>`;
        } else {
            input = `<input type="${isUrl ? 'url' : 'text'}" id="s-${s.key}" data-key="${s.key}" class="filter-select" value="${esc(s.value)}" style="width:100%;box-sizing:border-box;">`;
        }
        return `
            <div class="setting-row">
                <div>
                    <div class="setting-label">${esc(s.label)}</div>
                    <div class="setting-key">${esc(s.key)}</div>
                </div>
                <div>${input}</div>
            </div>
        `;
    }

    function checkMaintenance() {
        const banner = document.getElementById('maintenanceBanner');
        const items = allSettings['features'] || [];
        const maint = items.find(s => s.key === 'maintenance_mode');
        if (maint && maint.value === 'true') {
            banner.style.display = 'block';
        } else {
            banner.style.display = 'none';
        }
    }

    function collectSettings() {
        const result = {};
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.dataset.key;
            if (el.dataset.type === 'boolean') {
                result[key] = el.checked ? 'true' : 'false';
            } else {
                result[key] = el.value;
            }
        });
        return result;
    }

    document.getElementById('saveAllBtn').onclick = async () => {
        const settings = collectSettings();
        const res = await fetch(`${API}/admin/settings/bulk`, { method:'POST', headers: h(), body: JSON.stringify({settings}) });
        const json = await res.json();
        if (json.success) {
            toast(`Збережено ${json.data.updated.length} налаштувань`);
            // Refresh to get updated values
            await loadSettings();
        } else toast(json.detail || 'Помилка', 'error');
    };

    function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    document.getElementById('logoutBtn').onclick = () => { logout(); window.location.href = '/admin/login.html'; };
    const burger = document.getElementById('burgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobileOverlay');
    burger.onclick = () => { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); };
    overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); };

    loadSettings();
</script>

</body>
</html>
