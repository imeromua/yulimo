<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Емейли — Адмін-панель Юлімо</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .tabs { display:flex; gap:2px; margin-bottom:20px; border-bottom:2px solid #e8e0d0; }
        .tab-btn { padding:10px 20px; background:none; border:none; cursor:pointer; font-size:.95rem; color:#666; border-bottom:3px solid transparent; margin-bottom:-2px; }
        .tab-btn.active { color:#2d5a27; border-bottom-color:#2d5a27; font-weight:600; }
        .tab-pane { display:none; }
        .tab-pane.active { display:block; }
        .template-card { background:#fff; border:1px solid #e8e0d0; border-radius:10px; padding:16px; margin-bottom:14px; }
        .badge-sent { background:#d4edda; color:#155724; padding:2px 8px; border-radius:10px; font-size:.75rem; }
        .badge-failed { background:#f8d7da; color:#721c24; padding:2px 8px; border-radius:10px; font-size:.75rem; }
        .badge-pending { background:#fff3cd; color:#856404; padding:2px 8px; border-radius:10px; font-size:.75rem; }
    </style>
</head>
<body>

<div class="admin-layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/admin/bookings.html" class="sidebar-logo">ЮЛІМО</a>
            <div class="sidebar-label">Адмін-панель</div>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/bookings.html"><span class="nav-icon">📋</span> Бронювання</a>
            <a href="/admin/rooms.html"><span class="nav-icon">🏠</span> Номери</a>
            <a href="/admin/restaurant.html"><span class="nav-icon">🍽️</span> Ресторан</a>
            <a href="/admin/clients.html"><span class="nav-icon">👥</span> Клієнти</a>
            <a href="/admin/media.html"><span class="nav-icon">🖼️</span> Медіа</a>
            <a href="/admin/emails.html" class="active"><span class="nav-icon">📧</span> Емейли</a>
            <a href="/admin/content.html"><span class="nav-icon">📝</span> Контент</a>
            <a href="/admin/settings.html"><span class="nav-icon">⚙️</span> Налаштування</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebarUser">—</div>
            <button class="btn btn-secondary btn-block" id="logoutBtn">Вийти</button>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <div class="main-content">
        <header class="topbar">
            <button class="burger-btn" id="burgerBtn"><span></span><span></span><span></span></button>
            <span class="topbar-title">Емейли</span>
            <div class="topbar-actions">
                <button class="btn btn-primary btn-sm" id="sendEmailBtn">✉️ Надіслати лист</button>
            </div>
        </header>

        <main class="page-content">

            <!-- Stats -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Усього</div></div>
                <div class="stat-card"><div class="stat-value" id="statSent">—</div><div class="stat-label">Надіслано</div></div>
                <div class="stat-card"><div class="stat-value" id="statFailed">—</div><div class="stat-label">Помилки</div></div>
                <div class="stat-card"><div class="stat-value" id="statPending">—</div><div class="stat-label">Очікують</div></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="logs">📋 Журнал</button>
                <button class="tab-btn" data-tab="templates">📄 Шаблони</button>
            </div>

            <!-- Logs tab -->
            <div class="tab-pane active" id="tab-logs">
                <div class="filters">
                    <select class="filter-select" id="statusFilter">
                        <option value="">Усі статуси</option>
                        <option value="sent">Надіслано</option>
                        <option value="failed">Помилка</option>
                        <option value="pending">Очікує</option>
                    </select>
                    <select class="filter-select" id="typeFilter">
                        <option value="">Всі типи</option>
                        <option value="booking_confirm">Підтвердження</option>
                        <option value="booking_reminder">Нагадування</option>
                        <option value="booking_cancelled">Скасування</option>
                        <option value="birthday">День народження</option>
                        <option value="manual">Ручний</option>
                    </select>
                    <button class="btn btn-secondary btn-sm" id="filterBtn">🔍 Фільтрувати</button>
                </div>

                <div class="table-wrap" style="margin-top:16px;">
                    <table id="logsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Отримувач</th>
                                <th>Тема</th>
                                <th>Тип</th>
                                <th>Статус</th>
                                <th>Дата</th>
                                <th>Помилка</th>
                            </tr>
                        </thead>
                        <tbody id="logsTbody">
                            <tr class="loading-row"><td colspan="7"><span class="spinner"></span> Завантаження…</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="logsPagination" style="margin-top:12px;display:flex;gap:8px;align-items:center;"></div>
            </div>

            <!-- Templates tab -->
            <div class="tab-pane" id="tab-templates">
                <div id="templatesList"></div>
            </div>

        </main>
    </div>
</div>

<!-- Send email modal -->
<div id="sendModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;overflow:auto;">
    <div style="background:#fff;max-width:500px;margin:60px auto;border-radius:12px;padding:32px;">
        <h3 style="margin:0 0 16px;color:#2d5a27;">Надіслати лист</h3>
        <div id="sendAlert" class="alert"></div>
        <div style="display:grid;gap:12px;">
            <div>
                <label style="font-size:.85rem;color:#666;display:block;margin-bottom:4px;">Email отримувача *</label>
                <input type="email" id="sEmail" class="filter-select" style="width:100%;box-sizing:border-box;" placeholder="email@example.com">
            </div>
            <div>
                <label style="font-size:.85rem;color:#666;display:block;margin-bottom:4px;">Ім'я отримувача</label>
                <input type="text" id="sName" class="filter-select" style="width:100%;box-sizing:border-box;" placeholder="Ім'я">
            </div>
            <div>
                <label style="font-size:.85rem;color:#666;display:block;margin-bottom:4px;">Тема *</label>
                <input type="text" id="sSubject" class="filter-select" style="width:100%;box-sizing:border-box;" placeholder="Тема листа">
            </div>
            <div>
                <label style="font-size:.85rem;color:#666;display:block;margin-bottom:4px;">Текст листа *</label>
                <textarea id="sBody" class="filter-select" rows="6" style="width:100%;box-sizing:border-box;resize:vertical;font-family:inherit;" placeholder="Текст повідомлення або HTML…"></textarea>
            </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="btn btn-primary" id="doSendBtn" style="flex:1;">✉️ Надіслати</button>
            <button class="btn btn-secondary" id="closeSendBtn" style="flex:1;">Скасувати</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script type="module">
    import { requireAuth, logout, getToken } from './js/auth.js';
    if (!requireAuth()) { /* redirected */ }

    const API = '/api';
    const token = () => getToken();
    const h = () => ({ 'Authorization': `Bearer ${token()}` });
    const jh = () => ({ 'Authorization': `Bearer ${token()}`, 'Content-Type': 'application/json' });

    function toast(msg, type='success') {
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.textContent = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    let logsPage = 1;
    let logsStatus = '';
    let logsType = '';

    async function loadStats() {
        const res = await fetch(`${API}/admin/emails/stats`, { headers: h() });
        const json = await res.json();
        if (!json.success) return;
        const s = json.data;
        document.getElementById('statTotal').textContent = s.total;
        document.getElementById('statSent').textContent = s.sent;
        document.getElementById('statFailed').textContent = s.failed;
        document.getElementById('statPending').textContent = s.pending;
    }

    async function loadLogs(page=1) {
        logsPage = page;
        const tbody = document.getElementById('logsTbody');
        tbody.innerHTML = '<tr class="loading-row"><td colspan="7"><span class="spinner"></span></td></tr>';
        const params = new URLSearchParams({ page, per_page: 20 });
        if (logsStatus) params.append('status', logsStatus);
        if (logsType) params.append('template_type', logsType);
        const res = await fetch(`${API}/admin/emails/logs?${params}`, { headers: h() });
        const json = await res.json();
        if (!json.success) { tbody.innerHTML = '<tr><td colspan="7">Помилка завантаження</td></tr>'; return; }
        const { items, total, per_page } = json.data;
        if (!items.length) {
            tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📭</div><p>Логів не знайдено</p></div></td></tr>';
        } else {
            tbody.innerHTML = items.map(l => `
                <tr>
                    <td>${l.id}</td>
                    <td>${esc(l.recipient_email)}<br><small style="color:#999;">${esc(l.recipient_name||'')}</small></td>
                    <td style="max-width:200px;word-break:break-word;">${esc(l.subject)}</td>
                    <td>${esc(l.template_type||'manual')}</td>
                    <td><span class="badge-${l.status}">${l.status}</span></td>
                    <td style="white-space:nowrap;">${l.sent_at ? l.sent_at.replace('T',' ').slice(0,16) : '—'}</td>
                    <td style="color:#dc3545;font-size:.8rem;">${esc(l.error_message||'')}</td>
                </tr>
            `).join('');
        }
        // pagination
        const pages = Math.ceil(total / per_page);
        const pg = document.getElementById('logsPagination');
        pg.innerHTML = '';
        if (pages > 1) {
            pg.innerHTML = `<span style="color:#666;font-size:.85rem;">Стор. ${page}/${pages}</span>`;
            if (page > 1) pg.innerHTML += `<button class="btn btn-secondary btn-sm" onclick="loadLogs(${page-1})">← Попередня</button>`;
            if (page < pages) pg.innerHTML += `<button class="btn btn-secondary btn-sm" onclick="loadLogs(${page+1})">Наступна →</button>`;
        }
    }
    window.loadLogs = loadLogs;

    async function loadTemplates() {
        const res = await fetch(`${API}/admin/emails/templates`, { headers: h() });
        const json = await res.json();
        if (!json.success) return;
        const el = document.getElementById('templatesList');
        el.innerHTML = json.data.map(t => `
            <div class="template-card" id="tmpl-${t.id}">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                    <strong style="color:#2d5a27;">${esc(t.name)}</strong>
                    <span style="font-size:.8rem;color:#999;">${esc(t.template_type)}</span>
                </div>
                <div style="margin-bottom:10px;">
                    <label style="font-size:.8rem;color:#666;display:block;">Тема:</label>
                    <input type="text" id="tSubj-${t.id}" class="filter-select" value="${esc(t.subject)}" style="width:100%;box-sizing:border-box;margin-top:4px;">
                </div>
                <div style="margin-bottom:10px;">
                    <label style="font-size:.8rem;color:#666;display:block;">HTML-тіло:</label>
                    <textarea id="tBody-${t.id}" class="filter-select" rows="6" style="width:100%;box-sizing:border-box;resize:vertical;font-family:monospace;font-size:.82rem;">${esc(t.body_html)}</textarea>
                </div>
                <button class="btn btn-primary btn-sm" onclick="saveTemplate(${t.id})">💾 Зберегти</button>
                <small style="color:#999;margin-left:10px;">Оновлено: ${t.updated_at ? t.updated_at.replace('T',' ').slice(0,16) : '—'}</small>
            </div>
        `).join('');
    }

    window.saveTemplate = async function(id) {
        const subject = document.getElementById(`tSubj-${id}`).value.trim();
        const body_html = document.getElementById(`tBody-${id}`).value;
        if (!subject) { toast('Вкажіть тему', 'error'); return; }
        const res = await fetch(`${API}/admin/emails/templates/${id}`, { method:'PUT', headers: jh(), body: JSON.stringify({subject, body_html}) });
        const json = await res.json();
        if (json.success) toast('Шаблон збережено');
        else toast(json.detail || 'Помилка', 'error');
    };

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            if (btn.dataset.tab === 'templates') loadTemplates();
        };
    });

    document.getElementById('filterBtn').onclick = () => {
        logsStatus = document.getElementById('statusFilter').value;
        logsType = document.getElementById('typeFilter').value;
        loadLogs(1);
    };

    // Send modal
    const sendModal = document.getElementById('sendModal');
    document.getElementById('sendEmailBtn').onclick = () => { sendModal.style.display = 'block'; };
    document.getElementById('closeSendBtn').onclick = () => { sendModal.style.display = 'none'; };
    sendModal.onclick = e => { if (e.target === sendModal) sendModal.style.display = 'none'; };
    document.getElementById('doSendBtn').onclick = async () => {
        const email = document.getElementById('sEmail').value.trim();
        const subject = document.getElementById('sSubject').value.trim();
        const body = document.getElementById('sBody').value.trim();
        if (!email || !subject || !body) {
            document.getElementById('sendAlert').textContent = 'Заповніть всі обов\'язкові поля';
            document.getElementById('sendAlert').className = 'alert alert-error show';
            return;
        }
        const payload = { recipient_email: email, recipient_name: document.getElementById('sName').value.trim() || null, subject, body };
        const res = await fetch(`${API}/admin/emails/send`, { method:'POST', headers: jh(), body: JSON.stringify(payload) });
        const json = await res.json();
        if (json.success) { sendModal.style.display = 'none'; toast('Лист надіслано'); loadLogs(1); loadStats(); }
        else {
            document.getElementById('sendAlert').textContent = json.detail || json.error || 'Помилка';
            document.getElementById('sendAlert').className = 'alert alert-error show';
        }
    };

    function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    document.getElementById('logoutBtn').onclick = () => { logout(); window.location.href = '/admin/login.html'; };
    const burger = document.getElementById('burgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobileOverlay');
    burger.onclick = () => { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); };
    overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); };

    loadStats();
    loadLogs();
</script>

</body>
</html>
